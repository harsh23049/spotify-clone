<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <h1>Spotify Clone</h1>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Search</a></li>
                <li><a href="#">Your Library</a></li>
            </ul>
        </nav>
        <aside class="sidebar">
            <h2>Playlists</h2>
            <ul>
                <li><a href="#">My Favorite Songs</a></li>
                <li><a href="#">Chill Vibes</a></li>
                <li><a href="#">Top Hits</a></li>
                <li><a href="#">New Releases</a></li>
            </ul>
        </aside>
        <main class="main-player">
            <h2>Now Playing</h2>
            <div class="player-interface">
                <div class="track-info">
                    <h3>Track Title</h3>
                    <p>Artist Name</p>
                </div>
                <div class="controls">
                    <button>Play</button>
                    <button>Pause</button>
                    <button>Next</button>
                    <button>Previous</button>
                </div>
            </div>
            <section class="playlist">
                <h2>Your Playlist</h2>
                <ul>
                    <li>Track #1</li>
                    <li>Track #2</li>
                    <li>Track #3</li>
                    <li>Track #4</li>
                </ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
